# Continuous Integration
#
# This workflow runs automatically on every pull request (and on pushes to
# main). It is split into three jobs so you can see a real pipeline shape:
#
#   typecheck ─┐
#              ├─> build
#   test ──────┘
#
# "typecheck" and "test" run in parallel on separate machines. "build" only
# starts if BOTH succeed (that's what `needs:` means). If any job fails,
# GitHub marks the PR with a red cross and it should not be merged.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      # Every job runs on a fresh machine, so each one has to check out the
      # code and install dependencies for itself.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Make sure the TypeScript compiles without errors
      - run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Run the unit tests
      - run: npm test

  build:
    name: Build
    # Wait for both jobs above — no point building if the code is broken
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Make sure the site still builds for production
      - run: npm run build
