# Continuous Integration
#
# This workflow runs automatically on every pull request (and on pushes to
# main). It is split into three jobs so you can see a real pipeline shape:
#
#   typecheck ─┐   ┌─> build
#              ├───┤
#   test ──────┘   └─> e2e
#
# "typecheck" and "test" run in parallel on separate machines. "build" and
# "e2e" only start if BOTH succeed (that's what `needs:` means). If any job
# fails, GitHub marks the PR with a red cross and it should not be merged.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      # Every job runs on a fresh machine, so each one has to check out the
      # code and install dependencies for itself.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Make sure the TypeScript compiles without errors
      - run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Run the unit tests
      - run: npm test

  e2e:
    name: End-to-end tests
    # No point driving a browser if the code doesn't even compile
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The official Cypress action (from the GitHub Actions marketplace)
      # installs dependencies, caches the Cypress browser binary, starts the
      # dev server, waits until it responds, then runs every spec in
      # cypress/e2e. Pending tests are fine; failing ones turn the PR red.
      - uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: 'http://localhost:5173'

  build:
    name: Build
    # Wait for both jobs above — no point building if the code is broken
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Make sure the site still builds for production
      - run: npm run build
